<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xray Test Generator v2</title>
    <style>
        /* ================================================
           ATLAS DARK — Xray Test Generator v2
           Single-page accordion layout with sticky header
           ================================================ */

        :root {
            --accent-violet: #7c3aed;
            --accent-blue: #3b82f6;
            --accent-green: #10b981;
            --accent-red: #ef4444;
            --accent-orange: #f59e0b;

            --bg-base: #080819;
            --glass-bg: rgba(255, 255, 255, 0.04);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-border-hover: rgba(255, 255, 255, 0.14);

            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --text-disabled: #475569;

            --input-bg: rgba(255, 255, 255, 0.05);
            --input-border: rgba(255, 255, 255, 0.10);

            --shadow-card: 0 4px 24px rgba(0, 0, 0, 0.35), inset 0 1px 0 rgba(255, 255, 255, 0.06);
            --shadow-btn: 0 4px 16px rgba(124, 58, 237, 0.4);
        }

        * { box-sizing: border-box; }

        body {
            width: 100%;
            min-height: 100vh;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
            background: var(--bg-base);
            color: var(--text-primary);
            line-height: 1.5;
            font-size: 14px;
            overflow-x: hidden;
            transition: background-color 0.3s;
        }

        /* Ambient glow */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse at 10% 10%, rgba(124, 58, 237, 0.07) 0%, transparent 55%),
                radial-gradient(ellipse at 90% 90%, rgba(59, 130, 246, 0.05) 0%, transparent 55%);
            pointer-events: none;
            z-index: 0;
        }

        /* ================================================
           APP HEADER — sticky, dark gradient
           ================================================ */
        .app-header {
            position: sticky;
            top: 0;
            z-index: 20;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 11px 16px;
            background: linear-gradient(135deg, #12062a 0%, #0a1628 100%);
            border-bottom: 1px solid rgba(124, 58, 237, 0.25);
            box-shadow: 0 2px 20px rgba(0, 0, 0, 0.45);
        }

        .brand {
            font-size: 15px;
            font-weight: 700;
            background: linear-gradient(135deg, #c4b5fd, #93c5fd);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.2px;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Live connection dot */
        .connection-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--text-disabled);
            flex-shrink: 0;
            transition: background 0.4s, box-shadow 0.4s;
        }

        .connection-dot.connected {
            background: var(--accent-green);
            box-shadow: 0 0 6px rgba(16, 185, 129, 0.6);
            animation: dotPulse 2.5s infinite;
        }

        .connection-dot.conn-error {
            background: var(--accent-red);
            box-shadow: 0 0 6px rgba(239, 68, 68, 0.6);
        }

        @keyframes dotPulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.5); }
            50%       { box-shadow: 0 0 0 4px rgba(16, 185, 129, 0); }
        }

        .connection-label {
            font-size: 10px;
            color: var(--text-muted);
            max-width: 130px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        /* Language switcher */
        .lang-switcher {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 20px;
            padding: 3px;
            gap: 2px;
        }

        .lang-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.05em;
            padding: 3px 9px;
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.2s;
            height: auto;
            min-width: auto;
            font-family: inherit;
        }

        .lang-btn.active {
            background: rgba(124, 58, 237, 0.55);
            color: #fff;
            box-shadow: 0 1px 6px rgba(124, 58, 237, 0.4);
        }

        .lang-btn:hover:not(.active) {
            background: rgba(255, 255, 255, 0.08);
            color: var(--text-primary);
        }

        /* ================================================
           APP BODY
           ================================================ */
        .app-body {
            position: relative;
            z-index: 1;
            padding: 12px 0 16px;
        }

        /* ================================================
           CONFIG CARDS — collapsible glass panels
           ================================================ */
        .config-card {
            margin: 0 12px 10px;
            border-radius: 16px;
            border: 1px solid var(--glass-border);
            background: var(--glass-bg);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            overflow: hidden;
            transition: border-color 0.2s, box-shadow 0.2s;
            box-shadow: var(--shadow-card);
            position: relative;
        }

        .config-card:hover { border-color: var(--glass-border-hover); }

        /* Top-edge shimmer */
        .config-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.08), transparent);
            pointer-events: none;
            z-index: 1;
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px 14px;
            cursor: pointer;
            user-select: none;
            transition: background 0.15s;
        }

        .card-header:hover { background: rgba(255, 255, 255, 0.02); }

        .card-icon { font-size: 14px; flex-shrink: 0; line-height: 1; }

        .card-title {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-secondary);
        }

        .card-badge {
            margin-left: auto;
            font-size: 10px;
            font-weight: 600;
            padding: 2px 9px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.10);
            color: var(--text-muted);
            transition: all 0.3s;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .card-badge.verified {
            background: rgba(16, 185, 129, 0.12);
            border-color: rgba(16, 185, 129, 0.35);
            color: #34d399;
        }

        .card-badge.failed {
            background: rgba(239, 68, 68, 0.12);
            border-color: rgba(239, 68, 68, 0.35);
            color: #f87171;
        }

        .issue-badge {
            background: linear-gradient(135deg, rgba(124, 58, 237, 0.18), rgba(59, 130, 246, 0.18));
            border-color: rgba(124, 58, 237, 0.35);
            color: #c4b5fd;
        }

        .card-chevron {
            font-size: 12px;
            color: var(--text-muted);
            transition: transform 0.3s ease;
            flex-shrink: 0;
            margin-left: 4px;
        }

        .config-card.collapsed .card-chevron { transform: rotate(-90deg); }

        .card-body {
            padding: 0 14px 14px;
            overflow: hidden;
            max-height: 800px;
            transition: max-height 0.38s cubic-bezier(0.4, 0, 0.2, 1),
                        padding 0.3s ease,
                        opacity 0.25s ease;
            opacity: 1;
        }

        .config-card.collapsed .card-body {
            max-height: 0;
            padding-top: 0;
            padding-bottom: 0;
            opacity: 0;
        }

        /* ================================================
           EXECUTION CARD — appears after generation starts
           ================================================ */
        .execution-card {
            margin: 0 12px 14px;
            border-radius: 16px;
            border: 1px solid rgba(124, 58, 237, 0.22);
            background: linear-gradient(135deg, rgba(124, 58, 237, 0.05), rgba(59, 130, 246, 0.02));
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            box-shadow: var(--shadow-card);
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(12px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .execution-card .card-header { cursor: default; }
        .execution-card .card-header:hover { background: transparent; }

        /* ================================================
           FORM ELEMENTS
           ================================================ */
        .form-group { margin-bottom: 10px; }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        label {
            display: block;
            margin-bottom: 4px;
            font-weight: 600;
            font-size: 10px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.09em;
        }

        input, select, textarea {
            width: 100%;
            padding: 7px 11px;
            border: 1px solid var(--input-border);
            border-radius: 8px;
            background: var(--input-bg);
            color: var(--text-primary);
            font-size: 13px;
            font-family: inherit;
            box-sizing: border-box;
            transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
            caret-color: var(--accent-violet);
        }

        input::placeholder, textarea::placeholder {
            color: var(--text-muted);
            opacity: 0.65;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--accent-violet);
            box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.2);
            background: rgba(255, 255, 255, 0.08);
        }

        input:hover:not(:focus), textarea:hover:not(:focus) {
            border-color: var(--glass-border-hover);
            background: rgba(255, 255, 255, 0.06);
        }

        input.error, textarea.error {
            border-color: var(--accent-red);
            box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.15);
        }

        .validation-error {
            color: #f87171;
            font-size: 10px;
            margin-top: 3px;
            font-weight: 500;
        }

        /* ================================================
           BUTTONS
           ================================================ */
        button {
            padding: 0 14px;
            border: none;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.2s;
            height: 34px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            letter-spacing: 0.01em;
        }

        .btn-primary {
            background: linear-gradient(135deg, #7c3aed, #3b82f6);
            color: #fff;
            box-shadow: var(--shadow-btn);
        }

        .btn-primary:hover:not(:disabled) {
            filter: brightness(1.1);
            box-shadow: 0 6px 22px rgba(124, 58, 237, 0.55);
            transform: translateY(-1px);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.06);
            color: var(--text-secondary);
            border: 1px solid var(--glass-border);
        }

        .btn-secondary:hover:not(:disabled) {
            background: rgba(255, 255, 255, 0.10);
            border-color: var(--glass-border-hover);
            color: var(--text-primary);
            transform: translateY(-1px);
        }

        button:disabled {
            opacity: 0.32;
            cursor: not-allowed;
            transform: none !important;
            filter: none !important;
        }

        /* ================================================
           GENERATE CTA — main action button
           ================================================ */
        .generate-cta {
            padding: 6px 12px 10px;
        }

        .btn-generate {
            width: 100%;
            height: 52px;
            background: linear-gradient(135deg, #7c3aed 0%, #3b82f6 100%);
            border: none;
            border-radius: 12px;
            color: #fff;
            display: flex;
            align-items: center;
            padding: 0 18px;
            gap: 10px;
            cursor: pointer;
            box-shadow: 0 8px 28px rgba(124, 58, 237, 0.38), 0 2px 8px rgba(0, 0, 0, 0.3);
            transition: all 0.2s;
            position: relative;
            overflow: hidden;
        }

        /* Shimmer overlay */
        .btn-generate::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.12) 0%, transparent 60%);
            pointer-events: none;
        }

        .btn-generate:hover:not(:disabled) {
            box-shadow: 0 10px 36px rgba(124, 58, 237, 0.52), 0 2px 12px rgba(0, 0, 0, 0.3);
            transform: translateY(-1px);
        }

        .btn-generate:active:not(:disabled) { transform: translateY(0); }

        .btn-generate .btn-icon {
            font-size: 16px;
            flex-shrink: 0;
        }

        .btn-generate .btn-label {
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 0.07em;
            flex: 1;
            text-align: left;
        }

        .btn-generate .btn-meta {
            font-size: 11px;
            background: rgba(255, 255, 255, 0.18);
            padding: 3px 10px;
            border-radius: 10px;
            flex-shrink: 0;
            font-weight: 600;
        }

        /* ================================================
           STATUS MESSAGES
           ================================================ */
        .status {
            margin-top: 10px;
            padding: 9px 13px;
            border-radius: 10px;
            font-size: 12px;
            border: 1px solid;
            display: flex;
            align-items: center;
            gap: 8px;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .status.success {
            background: rgba(16, 185, 129, 0.08);
            border-color: rgba(16, 185, 129, 0.28);
            color: #34d399;
            box-shadow: 0 4px 16px rgba(16, 185, 129, 0.07);
        }

        .status.error {
            background: rgba(239, 68, 68, 0.08);
            border-color: rgba(239, 68, 68, 0.28);
            color: #f87171;
            box-shadow: 0 4px 16px rgba(239, 68, 68, 0.07);
        }

        .status.info {
            background: rgba(59, 130, 246, 0.08);
            border-color: rgba(59, 130, 246, 0.28);
            color: #60a5fa;
        }

        .status.warning {
            background: rgba(245, 158, 11, 0.08);
            border-color: rgba(245, 158, 11, 0.28);
            color: #fbbf24;
        }

        /* ================================================
           PROGRESS BAR
           ================================================ */
        .progress { margin-top: 10px; }

        .progress-text {
            font-size: 10px;
            color: var(--text-secondary);
            margin-bottom: 6px;
            font-weight: 600;
            letter-spacing: 0.07em;
            text-transform: uppercase;
        }

        .progress-bar-container {
            background: rgba(255, 255, 255, 0.06);
            border-radius: 4px;
            overflow: hidden;
            height: 5px;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #7c3aed, #3b82f6);
            width: 0%;
            transition: width 0.35s ease;
            border-radius: 4px;
            box-shadow: 0 0 10px rgba(124, 58, 237, 0.55);
        }

        /* ================================================
           STAGE INDICATOR
           ================================================ */
        .stage-indicator {
            font-size: 11px;
            color: #c4b5fd;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 6px;
            font-family: 'SF Mono', 'Fira Code', Menlo, monospace;
        }

        .stage-indicator::before {
            content: '›';
            font-size: 16px;
            line-height: 1;
            color: var(--accent-violet);
            flex-shrink: 0;
        }

        /* ================================================
           EXECUTION LOG
           ================================================ */
        .log {
            margin-top: 10px;
            max-height: 190px;
            overflow-y: auto;
            background: rgba(0, 0, 0, 0.28);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 10px;
            padding: 10px 12px;
            font-family: 'SF Mono', 'Fira Code', Menlo, Monaco, Consolas, monospace;
            font-size: 11px;
            border: 1px solid rgba(124, 58, 237, 0.16);
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.2), inset 0 1px 0 rgba(255, 255, 255, 0.03);
            line-height: 1.6;
        }

        .log::-webkit-scrollbar { width: 4px; }
        .log::-webkit-scrollbar-track { background: transparent; }
        .log::-webkit-scrollbar-thumb { background: rgba(124, 58, 237, 0.35); border-radius: 4px; }
        .log::-webkit-scrollbar-thumb:hover { background: rgba(124, 58, 237, 0.6); }

        .log-entry { margin-bottom: 2px; line-height: 1.55; }
        .log-entry.success { color: #34d399; }
        .log-entry.error   { color: #f87171; }
        .log-entry.info    { color: #60a5fa; }
        .log-entry.warning { color: #fbbf24; }

        /* ================================================
           RESULTS SUMMARY — 4-stat grid
           ================================================ */
        .results-summary {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 6px;
            margin-top: 12px;
        }

        .result-stat {
            text-align: center;
            background: var(--glass-bg);
            border-radius: 10px;
            padding: 10px 4px 8px;
            border: 1px solid var(--glass-border);
            transition: border-color 0.2s;
        }

        .result-stat:hover { border-color: var(--glass-border-hover); }

        .result-stat .stat-value {
            font-size: 20px;
            font-weight: 700;
            color: var(--text-primary);
            line-height: 1.2;
        }

        .result-stat .stat-label {
            font-size: 9px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin-top: 3px;
        }

        /* ================================================
           PREVIEW BUTTON (full width)
           ================================================ */
        .btn-preview {
            width: 100%;
            margin-top: 10px;
            font-size: 12px;
        }

        /* ================================================
           MISC
           ================================================ */
        .hidden { display: none !important; }

        .jql-textarea {
            min-height: 76px;
            max-height: 110px;
            resize: vertical;
            font-family: 'SF Mono', 'Fira Code', Menlo, monospace;
            font-size: 12px;
        }

        /* ================================================
           RESPONSIVE
           ================================================ */
        @media (max-width: 380px) {
            .app-header { padding: 10px 12px; }
            .config-card, .execution-card { margin: 0 8px 8px; }
            .form-row { grid-template-columns: 1fr; }
            .results-summary { grid-template-columns: repeat(2, 1fr); }
            .connection-label { display: none; }
            .btn-generate { height: 46px; }
            .btn-generate .btn-label { font-size: 13px; }
        }
    </style>
</head>

<body>
    <!-- ================================================
         APP HEADER
         ================================================ -->
    <header class="app-header">
        <div class="brand" data-i18n="brand">⚡ Xray Generator</div>
        <div class="header-right">
            <span class="connection-dot" id="connectionDot"></span>
            <span class="connection-label" id="connectionLabel">Not connected</span>
            <div class="lang-switcher">
                <button class="lang-btn active" id="langPl">PL</button>
                <button class="lang-btn" id="langEn">EN</button>
            </div>
        </div>
    </header>

    <main class="app-body">

        <!-- ================================================
             CARD 1: Jira Connection
             ================================================ -->
        <section class="config-card" data-card="credentials">
            <div class="card-header" data-toggle="credentials">
                <span class="card-icon">🔐</span>
                <span class="card-title" data-i18n="card.credentials.title">Jira Connection</span>
                <span class="card-badge" id="credentialsBadge" data-i18n="card.credentials.badge">Not verified</span>
                <span class="card-chevron">▾</span>
            </div>
            <div class="card-body">
                <div class="form-group">
                    <label for="jiraUrl" data-i18n="label.baseUrl">Base URL</label>
                    <input type="text" id="jiraUrl"
                        data-i18n-placeholder="placeholder.baseUrl"
                        placeholder="https://your-domain.atlassian.net">
                    <div id="jiraUrlError" class="validation-error hidden"></div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="jiraEmail" data-i18n="label.email">Email</label>
                        <input type="email" id="jiraEmail"
                            data-i18n-placeholder="placeholder.email"
                            placeholder="you@domain.com">
                        <div id="jiraEmailError" class="validation-error hidden"></div>
                    </div>
                    <div class="form-group">
                        <label for="jiraApiKey" data-i18n="label.apiKey">API Key</label>
                        <input type="password" id="jiraApiKey"
                            data-i18n-placeholder="placeholder.apiKey"
                            placeholder="Jira API token">
                        <div id="jiraApiKeyError" class="validation-error hidden"></div>
                    </div>
                </div>
                <button id="checkConnection" class="btn-secondary" style="width:100%"
                    data-i18n="btn.testConnection">
                    🔗 Test Connection
                </button>
                <div id="connectionStatus" class="status hidden"></div>
            </div>
        </section>

        <!-- ================================================
             CARD 2: Query Configuration
             ================================================ -->
        <section class="config-card" data-card="query">
            <div class="card-header" data-toggle="query">
                <span class="card-icon">🔍</span>
                <span class="card-title" data-i18n="card.query.title">Query Configuration</span>
                <span class="card-badge issue-badge" id="issueCountBadge">—</span>
                <span class="card-chevron">▾</span>
            </div>
            <div class="card-body">
                <div id="customJqlForm">
                        <div class="form-group">
                            <label for="customJql" data-i18n="label.jqlQuery">JQL Query</label>
                            <textarea id="customJql" class="jql-textarea"
                                placeholder="project = RES AND fixVersion = &quot;25.9&quot; AND development[pullrequests].all > 0 and development[pullrequests].open = 0"></textarea>
                            <div id="customJqlError" class="validation-error hidden"></div>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label for="customFixVersion" data-i18n="label.fixVersion">Fix Version</label>
                                <input type="text" id="customFixVersion" placeholder="25.9">
                                <div id="customFixVersionError" class="validation-error hidden"></div>
                            </div>
                            <div class="form-group">
                                <label for="customProjectKey" data-i18n="label.projectKey">Project Key</label>
                                <input type="text" id="customProjectKey" placeholder="RES">
                                <div id="customProjectKeyError" class="validation-error hidden"></div>
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="customComponentName" data-i18n="label.componentName">Component Name</label>
                            <input type="text" id="customComponentName" placeholder="5ways">
                            <div id="customComponentNameError" class="validation-error hidden"></div>
                        </div>
                </div>

                <button id="previewIssues" class="btn-secondary btn-preview"
                    data-i18n="btn.previewIssues">
                    🔍 Preview Issues
                </button>
                <div id="parametersStatus" class="status hidden"></div>
            </div>
        </section>

        <!-- ================================================
             GENERATE CTA — always visible
             ================================================ -->
        <div class="generate-cta">
            <button id="generateTests" class="btn-generate">
                <span class="btn-icon">▶</span>
                <span class="btn-label" data-i18n="btn.generateTests">GENERATE TESTS</span>
                <span class="btn-meta" id="generateMeta" data-i18n="generateMeta.ready">Ready</span>
            </button>
        </div>

        <!-- ================================================
             EXECUTION CARD — shown when generation starts
             ================================================ -->
        <section class="execution-card hidden" id="executionCard">
            <div class="card-header">
                <span class="card-icon">📊</span>
                <span class="card-title" data-i18n="card.execution.title">Execution Log</span>
                <span class="card-badge" id="executionBadge" data-i18n="execution.idle">Idle</span>
            </div>
            <div class="card-body">
                <div class="stage-indicator hidden" id="stageIndicator">Initializing...</div>
                <div id="progress" class="progress hidden">
                    <div id="progressText" class="progress-text">0%</div>
                    <div class="progress-bar-container">
                        <div id="progressBar" class="progress-bar"></div>
                    </div>
                </div>
                <div id="status" class="status hidden"></div>
                <div id="log" class="log hidden"></div>
                <div class="results-summary hidden" id="resultsSummary">
                    <div class="result-stat">
                        <div class="stat-value" id="statTests">—</div>
                        <div class="stat-label" data-i18n="stat.tests">🧪 Tests</div>
                    </div>
                    <div class="result-stat">
                        <div class="stat-value" id="statPlans">—</div>
                        <div class="stat-label" data-i18n="stat.plans">📋 Plans</div>
                    </div>
                    <div class="result-stat">
                        <div class="stat-value" id="statExecs">—</div>
                        <div class="stat-label" data-i18n="stat.execs">▶ Execs</div>
                    </div>
                    <div class="result-stat">
                        <div class="stat-value" id="statLinks">—</div>
                        <div class="stat-label" data-i18n="stat.links">🔗 Links</div>
                    </div>
                </div>
                <button id="resetStepper" class="btn-secondary hidden"
                    style="width:100%; margin-top:10px"
                    data-i18n="btn.runAgain">
                    🔄 Run Again
                </button>
            </div>
        </section>

    </main>

    <!-- ================================================
         STEPPER COMPATIBILITY LAYER (hidden, aria-hidden)
         Keeps stepperController.js working without DOM warnings
         ================================================ -->
    <div style="display:none" aria-hidden="true">
        <div class="step-list">
            <div class="step active" data-step="1">
                <div class="step-number"><span>1</span></div>
                <div class="step-title">Login</div>
            </div>
            <div class="step" data-step="2">
                <div class="step-number"><span>2</span></div>
                <div class="step-title">Params</div>
            </div>
            <div class="step" data-step="3">
                <div class="step-number"><span>3</span></div>
                <div class="step-title">Run</div>
            </div>
        </div>
        <div class="step-panels">
            <div class="step-panel active" data-panel="1"></div>
            <div class="step-panel" data-panel="2"></div>
            <div class="step-panel" data-panel="3"></div>
        </div>
        <!-- Nav buttons — kept for JS compatibility (addListener silently ignores absent elements) -->
        <button id="nextStep1"></button>
        <button id="nextStep2"></button>
        <button id="prevStep2"></button>
        <button id="prevStep3"></button>
    </div>

    <!-- i18n — must be first, no dependencies -->
    <script src="i18n.js"></script>

    <!-- Core modules -->
    <script src="constants.js"></script>
    <script src="logger.js"></script>
    <script src="domHelper.js"></script>

    <!-- Services -->
    <script src="validationService.js"></script>
    <script src="configManager.js"></script>
    <script src="errorHandler.js"></script>

    <!-- Jira modules -->
    <script src="jiraApiClient.js"></script>
    <script src="jiraService.js"></script>

    <!-- UI modules -->
    <script src="uiManager.js"></script>
    <script src="stepperController.js"></script>
    <script src="eventListenerManager.js"></script>

    <!-- Main application -->
    <script src="sidepanel.js"></script>
</body>

</html>
